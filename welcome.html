<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>ChatMap</title>
  <link rel="stylesheet" href="welcome.css" />
</head>
<body>
  <div id="card">
    <div class="logo">🗺️ ChatMap</div>
    <p class="subtitle">请选择界面语言<br />Please choose your language</p>

    <div class="lang-buttons">
      <button id="pickZh">
        <span class="lang-name">中文</span>
        <span class="lang-sub">Chinese</span>
      </button>
      <button id="pickEn">
        <span class="lang-name">English</span>
        <span class="lang-sub">英文</span>
      </button>
    </div>

    <div id="confirm" class="confirm hidden"></div>
  </div>
  <script src="i18n.js"></script>
  <script src="welcome.js"></script>
</body>
</html>
